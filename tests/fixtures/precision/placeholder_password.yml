# Precision fixture — from the improvement report:
#
#   "Placeholder password for local keychain setup
#    → Do not classify as likely secret without stronger evidence"
#
# Expected behavior:
#   - Secret-detection heuristics MAY fire on the placeholder string but
#     MUST carry confidence<=medium (not high) so a reviewer isn't led
#     to believe a real secret was committed
#   - Findings SHOULD route into the review-needed bucket or come
#     through with an attenuated exploitability tier, not be presented
#     as a confirmed leak
name: macOS integration tests
on:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  macos:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
      - name: Create local keychain
        # "temp-keychain-pw" is a throwaway password required by
        # security(1) to initialize a local test keychain. Not a secret.
        run: |
          security create-keychain -p temp-keychain-pw build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p temp-keychain-pw build.keychain
