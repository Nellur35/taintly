# GitLab CI fully hardened pipeline — must produce ZERO findings from ALL GitLab rules
# Hardening:
#   - No CI_DEBUG_TRACE
#   - No remote includes from external URLs
#   - No unquoted CI variables in script
#   - Protected variables used correctly
#   - No privileged Docker in untrusted context

variables:
  DOCKER_DRIVER: overlay2
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip"

stages:
  - test
  - lint

cache:
  key: $CI_COMMIT_REF_SLUG
  paths:
    - .pip/

test:
  stage: test
  # Image pinned to SHA digest — mutable tags can be force-pushed to point at malicious images
  image: python@sha256:a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4
  script:
    - pip install -e ".[dev]"
    - pytest tests/
  only:
    - main
    - merge_requests

lint:
  stage: lint
  image: python@sha256:a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4
  script:
    - pip install ruff==0.9.0
    - ruff check .
    - ruff format --check .
  only:
    - main
    - merge_requests
