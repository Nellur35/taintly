# ai_agent_cli_on_pr.yml
# Expected findings: AI-GH-013 (agentic CLI on fork-triggerable event)
name: Claude CLI review
on: pull_request

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@1.0.0

      - name: Run Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: claude -p "Review this PR and comment on the changed files"
