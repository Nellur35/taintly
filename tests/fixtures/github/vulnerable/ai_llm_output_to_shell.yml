# ai_llm_output_to_shell.yml
# Expected findings: AI-GH-007 (LLM output piped into shell interpreter)
name: Auto-label PRs
on: pull_request

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Classify and set label
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "LABEL=$(openai api chat.completions.create -m gpt-4 -p "$PR_BODY")" >> $GITHUB_ENV
