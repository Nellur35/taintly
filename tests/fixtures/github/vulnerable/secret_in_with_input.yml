# secret_in_with_input.yml — vulnerable fixture for SEC6-GH-010.
#
# A credential-shape input on a third-party action receives a secret
# value directly via ``with:``.  The runner's log-redactor only
# masks values that flow through ``env:``, so a debug-style echo
# inside the action would leak the secret into the job log.  The
# safe pattern routes the secret through env: and references it via
# ``${{ env.NAME }}`` from with:.
name: Publish

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: some-org/registry-publish@deadbeefdeadbeefdeadbeefdeadbeefdeadbeef
        with:
          token: ${{ secrets.REGISTRY_TOKEN }}
