# taint_agent_output.yml
# Expected findings: TAINT-GH-005 (agent step output → shell run:)
#                    AI-GH-014 also fires (shallow precondition — same pattern)
#                    AI-GH-006 also fires (agent on fork event).
name: Claude PR review
on: pull_request

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Ask Claude to classify the PR
        id: classify
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: "Classify this PR into one of: bug, feat, chore."

      - name: Use Claude's output
        run: echo "Got label: ${{ steps.classify.outputs.label }}"
