# with_input_no_secret.yml — safe fixture for SEC6-GH-010.
#
# Action inputs receive non-secret values: a hardcoded URL, a
# constant string, and a non-credential field that happens to read a
# secret (``repository:``) but does NOT match the credential-shape
# anchor.  SEC6-GH-010 must NOT fire on any of these.
name: Build

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
