# secret_in_with_but_also_env.yml — safe fixture for SEC6-GH-010.
#
# The credential-shape input on the third-party action references
# ``env.REGISTRY_TOKEN``, and the same token is declared in the
# step's ``env:`` block.  The env: declaration registers the value
# with the runner's log-redactor, so any echo inside the action is
# masked.  SEC6-GH-010 must NOT fire.
name: Publish

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: some-org/registry-publish@deadbeefdeadbeefdeadbeefdeadbeefdeadbeef
        with:
          token: ${{ env.REGISTRY_TOKEN }}
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
