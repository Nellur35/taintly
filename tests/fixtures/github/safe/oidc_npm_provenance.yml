# oidc_npm_provenance.yml — safe fixture for SEC5-GH-001.
#
# ``npm publish --provenance`` (npm 9+) attaches a sigstore-backed
# provenance attestation, which requires the workflow's OIDC token.
# id-token: write is legitimately required.  SEC5-GH-001 must NOT fire.
name: Publish (npm)

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          registry-url: 'https://registry.npmjs.org'
      - run: npm publish --provenance --access public
