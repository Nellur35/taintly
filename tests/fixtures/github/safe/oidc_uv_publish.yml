# oidc_uv_publish.yml — safe fixture for SEC5-GH-001.
#
# Modern PEP-740 trusted-publishing flow: ``uv publish`` auto-detects
# the workflow's OIDC token, so id-token: write is legitimately used.
# SEC5-GH-001 must NOT fire.
name: Publish (uv)

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - run: uv build
      - run: uv publish
