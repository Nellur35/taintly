name: Secret scan

# PSE Domain 3.6 — Secret Scanning.
# Runs gitleaks on every push/PR and on the full git history weekly.
# A secret that lands in git history is effectively public even after
# deletion — branch protection alone cannot prevent this, so the scan
# must run BEFORE merge.

on:
  push:
    branches: [main, "claude/*"]
  pull_request:
    branches: [main]
  schedule:
    # Weekly deep-history scan catches retroactive introductions.
    - cron: "0 9 * * 1"

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    # Scheduled runs fetch full history — 15-min bound covers the
    # deep-history case; PR runs with shallow fetch finish in < 1 min.
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          # Fetch full history so scheduled runs scan the whole repo,
          # not just the tip. PRs use shallow fetch by default — that's
          # the right trade-off for PR-speed.
          fetch-depth: ${{ github.event_name == 'schedule' && 0 || 1 }}

      - name: Install gitleaks
        # Pinned version + SHA256 checksum — reproducible install, no
        # action wrapper. gitleaks-action@v2 was used previously but
        # fails on pull_request events without GITHUB_TOKEN (it tries
        # to post a PR summary comment and treats the failure as
        # job-fatal); the workflow deliberately withholds the token to
        # minimise fork-PR attack surface, so the action was
        # guaranteed-red on every PR. The CLI has no such dependency —
        # it scans and exits 0/1 based solely on findings.
        env:
          GITLEAKS_VERSION: "8.28.0"
          GITLEAKS_SHA256: "a65b5253807a68ac0cafa4414031fd740aeb55f54fb7e55f386acb52e6a840eb"
        run: |
          set -euo pipefail
          curl -sSfL -o gitleaks.tgz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tgz" | sha256sum --check
          tar -xzf gitleaks.tgz gitleaks
          chmod +x gitleaks
          ./gitleaks version

      - name: Run gitleaks
        # Direct CLI invocation. `detect` scans the working tree + git
        # history (within the checkout's fetch-depth); exit 0 = clean,
        # exit 1 = findings, exit ≥2 = infrastructure error. No token
        # required, no action wrapper, no PR-comment side effect.
        run: |
          ./gitleaks detect \
            --source=. \
            --config=.gitleaks.toml \
            --redact \
            --no-banner \
            --exit-code=1
