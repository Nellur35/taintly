name: Test Release

# TestPyPI dry run of the publish pipeline.
#
# Lets maintainers validate the build + upload path WITHOUT burning a
# real version number on pypi.org. Triggered manually via
# `workflow_dispatch` so it never fires on pushes / tags by accident.
#
# Auth: TestPyPI trusted publishing via OIDC, same model as release.yml
# — configure a pending publisher on test.pypi.org pointed at this
# workflow + the `testpypi` environment.
#
# The version number uploaded to TestPyPI is whatever setuptools-scm
# derives from the current commit: for an untagged commit it's
# something like `1.0.0.dev7+g5d67acf`, which is fine for TestPyPI's
# cleanup policy.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to build from (default: the branch this is dispatched on)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          # Full history AND tags — actions/checkout v6 does not fetch
          # tags by default even with fetch-depth: 0, and setuptools-scm
          # needs the tags to derive a real version (not 0.0.0+unknown).
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ inputs.ref }}

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: pip install build==1.2.2

      - name: Build sdist + wheel
        run: python -m build

      - name: Sanity-check the wheel installs cleanly
        run: |
          python -m venv /tmp/install-check
          /tmp/install-check/bin/pip install dist/*.whl
          /tmp/install-check/bin/taintly --version

      - name: Upload build artefacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      # Separate environment from production `pypi` — lets maintainers
      # keep reviewer-approval rules asymmetric (tighter on prod, looser
      # on dry-run) without touching the workflow.
      name: testpypi
      url: https://test.pypi.org/project/taintly/
    permissions:
      # OIDC token exchange for TestPyPI trusted publishing.
      id-token: write
    steps:
      - name: Download build artefacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          verify-metadata: true
          # TestPyPI fills up quickly and re-runs on the same version
          # are expected during dry-run iteration — skip the collision.
          skip-existing: true
